name: Lint Code Base

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions: {}

jobs:
  run-lint:
    name: Super-Linter
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      statuses: write

      # Enable these only if you want Super-Linter to post PR summary comments.
      # issues: write
      # pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Lint Code Base
        uses: super-linter/super-linter@v8.6.0
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: "main"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Keep this false unless you enabled issues/pull-requests write above.
          ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: false
          FILTER_REGEX_EXCLUDE: >-
            (^|/)(compile_commands\.json|\.sconsign\.dblite)$|
            (^|/)(build|bin|out|dist)/|
            (^|/)godot-cpp/
