name: Lint Code Base

on:
  workflow_dispatch:

  push:
    branches: [main]

  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-lint:
    name: Super-Linter
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: false

      - name: Lint Code Base
        uses: super-linter/super-linter/slim@9e863354e3ff62e0727d37183162c4a88873df41 # v8.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
        
          ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: false
          ENABLE_GITHUB_ACTIONS_STEP_SUMMARY: true
          SAVE_SUPER_LINTER_SUMMARY: true
          ENABLE_GITHUB_ACTIONS_GROUP_TITLE: true
        
          SUPPRESS_FILE_TYPE_WARN: true
          SUPPRESS_POSSUM: true
        
          VALIDATE_BASH: true
          VALIDATE_BASH_EXEC: true
          VALIDATE_CLANG_FORMAT: true
          VALIDATE_EDITORCONFIG: true
          VALIDATE_GIT_MERGE_CONFLICT_MARKERS: true
          VALIDATE_GITHUB_ACTIONS: true
          VALIDATE_GITHUB_ACTIONS_ZIZMOR: true
          VALIDATE_GITLEAKS: true
          VALIDATE_JSON: true
          VALIDATE_JSON_PRETTIER: true
          VALIDATE_JSONC: true
          VALIDATE_JSONC_PRETTIER: true
          VALIDATE_MARKDOWN: true
          VALIDATE_MARKDOWN_PRETTIER: true
          VALIDATE_PYTHON_RUFF: true
          VALIDATE_PYTHON_RUFF_FORMAT: true
          VALIDATE_SHELL_SHFMT: true
          VALIDATE_XML: true
          VALIDATE_YAML: true
          VALIDATE_YAML_PRETTIER: true
        
          FILTER_REGEX_EXCLUDE: >-
            (^|/)(\.git|\.godot|godot-cpp|third-party|build|bin|out|dist|coverage|artifacts|package|node_modules|\.cache|\.vs|\.vscode|__pycache__)(/|$)|
            (^|/)project/addons/GoToolCenter/bin/|
            (^|/)src/gen/.*\.gen\.(c|cc|cpp|cxx|h|hh|hpp|hxx)$|
            (^|/)(compile_commands\.json|\.sconsign\.dblite)$|
            (^|/).*\.uid$|
            (^|/).*\.import$|
            (^|/).*\.(db|sqlite|sqlite3)$