name: Build GDExtension Native Libraries

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "SConstruct"
      - "SCsub"
      - "src/**"
      - "godot-cpp/**"
      - "third-party/**"
      - "addons/GoToolCenter/**"
      - ".gitmodules"
      - ".github/workflows/build-gdextension.yml"
  pull_request:
    paths:
      - "SConstruct"
      - "SCsub"
      - "src/**"
      - "godot-cpp/**"
      - "third-party/**"
      - "addons/GoToolCenter/**"
      - ".gitmodules"
      - ".github/workflows/build-gdextension.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
            artifact_name: gotool-center-linux-x86_64

          - os: windows-latest
            platform: windows
            arch: x86_64
            artifact_name: gotool-center-windows-x86_64

          - os: macos-latest
            platform: macos
            arch: universal
            artifact_name: gotool-center-macos-universal

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify godot-cpp submodule
        run: |
          git submodule status --recursive
          python -c "from pathlib import Path; p = Path('godot-cpp/SConstruct'); print('godot-cpp/SConstruct exists:', p.is_file()); raise SystemExit(0 if p.is_file() else 1)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SCons
        run: |
          python -m pip install --upgrade pip
          python -m pip install scons

      - name: Print build environment
        run: |
          python --version
          python -m SCons --version
          git submodule status --recursive

      - name: Build debug library
        run: |
          python -m SCons platform=${{ matrix.platform }} target=template_debug arch=${{ matrix.arch }} -j2

      - name: Build release library
        run: |
          python -m SCons platform=${{ matrix.platform }} target=template_release arch=${{ matrix.arch }} -j2

      - name: List native library outputs
        run: |
          python -c "from pathlib import Path; root = Path('addons/GoToolCenter/bin'); print('Output directory:', root.resolve()); [print(p.as_posix()) for p in sorted(root.glob('*'))]"

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            addons/GoToolCenter/bin/**
          if-no-files-found: error

  package:
    name: Package all native libraries
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create combined addon bin folder
        run: |
          mkdir -p package/addons/GoToolCenter/bin

          find artifacts -type f \( \
            -name "*.dll" -o \
            -name "*.so" -o \
            -name "*.dylib" \
          \) -exec cp {} package/addons/GoToolCenter/bin/ \;

          find package -type f -print

      - name: Upload combined native library package
        uses: actions/upload-artifact@v4
        with:
          name: gotool-center-all-platforms
          path: package/**
          if-no-files-found: error
