name: Build GDExtension Native Libraries

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "SConstruct"
      - "SCsub"
      - "src/**"
      - "godot-cpp/**"
      - "third-party/**"
      - "addons/gotool_center/**"
      - ".github/workflows/build-gdextension.yml"
  pull_request:
    paths:
      - "SConstruct"
      - "SCsub"
      - "src/**"
      - "godot-cpp/**"
      - "third-party/**"
      - "addons/gotool_center/**"
      - ".github/workflows/build-gdextension.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
            artifact_name: gotool-center-linux-x86_64

          - os: windows-latest
            platform: windows
            arch: x86_64
            artifact_name: gotool-center-windows-x86_64

          - os: macos-latest
            platform: macos
            arch: universal
            artifact_name: gotool-center-macos-universal

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SCons
        run: |
          python -m pip install --upgrade pip
          python -m pip install scons

      - name: Print build environment
        run: |
          python --version
          python -m SCons --version

      - name: Build debug library
        run: |
          python -m SCons platform=${{ matrix.platform }} target=template_debug arch=${{ matrix.arch }} -j2

      - name: Build release library
        run: |
          python -m SCons platform=${{ matrix.platform }} target=template_release arch=${{ matrix.arch }} -j2

      - name: List native library outputs
        run: |
          python -c "from pathlib import Path; [print(p.as_posix()) for p in Path('addons/gotool_center/bin').glob('*')]"

      - name: Upload native library artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            addons/gotool_center/bin/**
          if-no-files-found: error
