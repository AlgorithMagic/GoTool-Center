name: Native Quality Gates

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions: {}

jobs:
  native-tests:
    name: Native Doctest
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            lld \
            python3 \
            python3-pip \
            scons

      - name: Build native doctest executable
        run: |
          scons platform=linux target=template_debug arch=x86_64 doctest=1 compiledb=0

      - name: Run native doctest executable
        run: |
          ./build/tests/linux/template_debug/x86_64/gotool_native_tests

  asan-ubsan:
    name: ASan + UBSan
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            lld \
            python3 \
            scons

      - name: Build sanitizer test executable
        run: |
          scons \
            platform=linux \
            target=template_debug \
            arch=x86_64 \
            doctest=1 \
            sanitizer=asan_ubsan \
            use_llvm=yes \
            compiledb=0

      - name: Run ASan/UBSan tests
        run: |
          ./build/tests/linux/template_debug/x86_64/gotool_native_tests
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_init_order=1:check_initialization_order=1:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

  tsan:
    name: TSan
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            lld \
            python3 \
            scons

      - name: Build TSan test executable
        run: |
          scons \
            platform=linux \
            target=template_debug \
            arch=x86_64 \
            doctest=1 \
            sanitizer=tsan \
            use_llvm=yes \
            compiledb=0

      - name: Run TSan tests
        run: |
          ./build/tests/linux/template_debug/x86_64/gotool_native_tests
        env:
          TSAN_OPTIONS: halt_on_error=1:history_size=7

  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc \
            g++ \
            python3 \
            python3-pip \
            scons \
            gcovr
          python3 -m pip install --user diff-cover

      - name: Build coverage executable
        run: |
          scons \
            platform=linux \
            target=template_debug \
            arch=x86_64 \
            doctest=1 \
            coverage=1 \
            compiledb=0

      - name: Run native tests
        run: |
          ./build/tests/linux/template_debug/x86_64/gotool_native_tests

      - name: Enforce global coverage
        run: |
          gcovr \
            --root . \
            --exclude 'godot-cpp/.*' \
            --exclude 'third-party/.*' \
            --exclude 'build/.*' \
            --exclude 'tests/.*' \
            --fail-under-line 85 \
            --fail-under-branch 75

      - name: Generate Cobertura coverage XML
        run: |
          gcovr \
            --root . \
            --xml-pretty \
            --output coverage.xml \
            --exclude 'godot-cpp/.*' \
            --exclude 'third-party/.*' \
            --exclude 'build/.*' \
            --exclude 'tests/.*'

      - name: Enforce changed-code coverage
        if: github.event_name == 'pull_request'
        run: |
          python3 -m diff_cover.diff_cover_tool coverage.xml \
            --compare-branch origin/main \
            --fail-under 90